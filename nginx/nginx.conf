events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream ingestion_gateway {
        server ingestion-gateway:8080 max_fails=3 fail_timeout=30s;
    }

    upstream ml_engine {
        server ml-anomaly-engine:8000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # API routes → Ingestion Gateway
        location /api/ {
            proxy_pass http://ingestion_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check route for load balancer probes
        location /health {
            proxy_pass http://ingestion_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ML Engine routes
        location /ml/ {
            rewrite ^/ml/(.*) /$1 break;
            proxy_pass http://ml_engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}