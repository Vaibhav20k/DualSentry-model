global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ingestion-gateway"
    static_configs:
      - targets:
          - ingestion-gateway:8080
    metrics_path: /metrics

  - job_name: "ml-anomaly-engine"
    static_configs:
      - targets:
          - ml-anomaly-engine:8000
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090