syntax = "proto3";

package transaction;

option go_package = "github.com/Vaibhav20k/fintech-pipeline/ingestion-gateway/proto";

// ==========================================
// Transaction Request
// ==========================================

message TransactionRequest {

  // User
  string user_id = 1;

  // Time
  string timestamp = 2;

  // Transaction Details
  double amount = 3;

  string currency = 4;

  string transaction_type = 5;

  string payment_method = 6;

  string payment_identifier = 7;

  string merchant = 8;

  string merchant_category = 9;

  string receiver_account = 10;

  // Device / Network
  string location = 11;

  string ip_address = 12;

  string device_id = 13;
}

// ==========================================
// Transaction Response
// ==========================================

message TransactionResponse {

  string transaction_id = 1;

  string status = 2;

  string message = 3;
}

// ==========================================
// Transaction Service
// ==========================================

service TransactionService {

  rpc SubmitTransaction(TransactionRequest)
      returns (TransactionResponse);

}